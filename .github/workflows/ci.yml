name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features test-mocks --verbose

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  audit:
    name: Audit
    runs-on: ubuntu-latest
    # Advisory-only — surfaces RustSec findings in the job summary but never
    # blocks PR merges. The transitive advisories we currently carry (rsa
    # Marvin Attack, rustls-webpki pinned by serenity 0.12, etc.) can only
    # be cleared by upstream releases. Re-evaluate when serenity 0.13 ships.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit (advisory only)
        run: |
          set +e
          cargo audit 2>&1 | tee audit_output.txt
          status=${PIPESTATUS[0]}
          {
            echo "## cargo audit report"
            echo ""
            echo '```'
            cat audit_output.txt
            echo '```'
            echo ""
            if [ "$status" -eq 0 ]; then
              echo "_No advisories found._"
            else
              echo "_Advisories above are informational only — see job description for context._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
